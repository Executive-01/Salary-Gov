const tbody=document.getElementById("tbody");
const search=document.getElementById("search");
const category=document.getElementById("category");

function badge(type){

if(type.includes("TICKET")){
return `<span class="badge ticket">${type}</span>`;
}

if(type.includes("IMPOUND")){
return `<span class="badge impound">${type}</span>`;
}

return `<span class="badge jail">${type}</span>`;

}

function copyCode(code){

navigator.clipboard.writeText(code);

alert("Copied : "+code);

}

function render(){

const keyword=search.value.toLowerCase();

const cat=category.value;

tbody.innerHTML="";

const result=data.filter(item=>{

const matchSearch=

item.code.toLowerCase().includes(keyword) ||

item.violation.toLowerCase().includes(keyword) ||

item.jailtime.toLowerCase().includes(keyword) ||

String(item.fine).includes(keyword);

const matchCategory=

cat==="ALL" ||

item.code.startsWith(cat);

return matchSearch && matchCategory;

});

result.forEach(item=>{

tbody.innerHTML+=`

<tr>

<td>${item.code}</td>

<td>${item.violation}</td>

<td>${badge(item.jailtime)}</td>

<td>$${item.fine.toLocaleString()}</td>

<td>

<button class="copy"

onclick="copyCode('${item.code}')">

Copy

</button>

</td>

</tr>

`;

});

}

search.addEventListener("keyup",render);

category.addEventListener("change",render);

render();

</script>
